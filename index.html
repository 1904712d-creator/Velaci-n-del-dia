<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>LUX ETERNA | Ministerio del Amor</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Cinzel:wght@400;700&family=Cormorant+Garamond:wght@300;500;600&display=swap');

        :root {
            --gold-primary: #c5a059;
            --gold-dark: #8a6d3b;
            --bg-dark: #0d0b11;
        }

        body {
            background: radial-gradient(circle at center, #1a1622 0%, #0d0b11 100%);
            color: #e2d9c2;
            font-family: 'Cormorant Garamond', serif;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            margin: 0;
            padding: 40px 20px;
            overflow-x: hidden;
        }

        .cinzel { font-family: 'Cinzel', serif; }

        /* Estilo de los textos superiores según captura */
        .sub-header {
            font-size: 10px;
            letter-spacing: 2px;
            color: rgba(226, 217, 194, 0.7);
            margin-bottom: 30px;
            text-transform: uppercase;
        }

        .main-title {
            font-size: 2.5rem;
            letter-spacing: 8px;
            color: var(--gold-primary);
            margin-bottom: 5px;
            font-weight: 400;
        }

        .tagline {
            font-size: 9px;
            letter-spacing: 4px;
            color: var(--gold-primary);
            text-transform: uppercase;
            opacity: 0.8;
            margin-bottom: 50px;
        }

        /* Vela */
        .candle-container { margin-bottom: 40px; position: relative; }
        .flame {
            width: 14px; height: 22px;
            background: linear-gradient(to bottom, #fff, #ffeb3b, #ff9800, #f44336);
            border-radius: 50% 50% 20% 20%;
            margin: 0 auto 5px;
            filter: blur(0.5px);
            box-shadow: 0 0 15px rgba(255, 191, 0, 0.6);
            animation: flicker 0.15s infinite alternate;
        }
        .candle-body {
            width: 35px; height: 85px;
            background: linear-gradient(to right, #b3b3b3, #ffffff, #b3b3b3);
            border-radius: 3px;
            margin: 0 auto;
            box-shadow: 0 10px 20px rgba(0,0,0,0.5);
        }
        @keyframes flicker { 0% { transform: scale(1) rotate(-1deg); opacity: 0.9; } 100% { transform: scale(1.05) rotate(1deg); opacity: 1; } }

        /* Textos de fecha */
        .date-display { font-size: 1.5rem; color: #fff; margin-bottom: 5px; letter-spacing: 1px; }
        .astral-info { font-size: 9px; letter-spacing: 2px; font-style: italic; color: var(--gold-primary); text-transform: uppercase; margin-bottom: 40px; }

        /* Botón estilo captura */
        .btn-gold {
            background: linear-gradient(to bottom, #d4af37, #aa8a2e);
            color: #1a1622;
            font-family: 'Cinzel', serif;
            font-size: 12px;
            font-weight: 700;
            letter-spacing: 2.5px;
            padding: 18px 40px;
            border-radius: 12px;
            width: 100%;
            max-width: 320px;
            text-transform: uppercase;
            box-shadow: 0 4px 15px rgba(0,0,0,0.4);
            border: none;
            cursor: pointer;
            transition: all 0.3s ease;
        }
        .btn-gold:active { transform: scale(0.98); filter: brightness(1.1); }

        /* Cuadro de resultado */
        .result-box {
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid rgba(197, 160, 89, 0.3);
            border-radius: 15px;
            padding: 25px;
            width: 100%;
            max-width: 320px;
            margin-top: 20px;
            display: none;
            backdrop-filter: blur(5px);
        }

        .error-toast {
            position: fixed; top: 20px; left: 50%; transform: translateX(-50%);
            background: rgba(60, 20, 20, 0.9); border: 1px solid #ff4444;
            color: #ffcccc; padding: 15px 25px; border-radius: 8px;
            font-size: 11px; z-index: 100; display: none; text-align: center;
            letter-spacing: 1px; line-height: 1.5;
        }

        .loader { display: none; margin: 20px 0; }
    </style>
</head>
<body>

    <div id="error-msg" class="error-toast cinzel">
        LA CONEXIÓN ASTRAL ES DÉBIL.<br>REINTENTA EN UNOS SEGUNDOS.
    </div>

    <p class="sub-header">Ministerio del amor presenta</p>
    
    <h1 class="main-title cinzel">LUX ETERNA</h1>
    <p class="tagline">Guía de velación alquímica</p>

    <div class="candle-container">
        <div class="flame" id="flame-fx"></div>
        <div class="candle-body" id="candle-obj"></div>
    </div>

    <p id="v-date" class="date-display cinzel">19 DE ABRIL DE 2026</p>
    <p id="v-astral" class="astral-info">Día de Domingo · Regido por el Sol</p>

    <button id="btn-reveal" onclick="consultarAlquimia()" class="btn-gold">
        Consultar Velación
    </button>

    <div id="v-loader" class="loader">
        <div class="w-8 h-8 border-2 border-[#c5a059] border-t-transparent rounded-full animate-spin mx-auto mb-3"></div>
        <p class="cinzel text-[9px] tracking-widest animate-pulse">CANALIZANDO ENERGÍAS...</p>
    </div>

    <div id="v-result" class="result-box">
        <h2 id="r-color" class="cinzel text-xl text-center mb-2" style="color: var(--gold-primary);"></h2>
        <p id="r-frase" class="text-sm italic text-center text-gray-400 mb-4"></p>
        <div class="h-px bg-white/10 w-full mb-4"></div>
        <div id="r-pasos" class="text-[13px] space-y-4 text-gray-200 leading-relaxed"></div>
        
        <button onclick="window.location.reload()" class="mt-8 w-full text-[9px] uppercase tracking-widest text-gray-500 hover:text-white transition-colors">Nueva consulta</button>
    </div>

    <script>
        // TU API KEY
        const apiKey = "AIzaSyCsPZgn5DnL_QWAXXa4r_m4WTG_PdT8lLQ";

        const d = new Date();
        const dias = ['Domingo', 'Lunes', 'Martes', 'Miércoles', 'Jueves', 'Viernes', 'Sábado'];
        const meses = ['Enero', 'Febrero', 'Marzo', 'Abril', 'Mayo', 'Junio', 'Julio', 'Agosto', 'Septiembre', 'Octubre', 'Noviembre', 'Diciembre'];
        const astros = ['el Sol', 'la Luna', 'Marte', 'Mercurio', 'Júpiter', 'Venus', 'Saturno'];
        
        // Actualizar UI inicial
        document.getElementById('v-date').innerText = `${d.getDate()} DE ${meses[d.getMonth()].toUpperCase()} DE ${d.getFullYear()}`;
        document.getElementById('v-astral').innerText = `Día de ${dias[d.getDay()]} · Regido por ${astros[d.getDay()]}`;

        async function consultarAlquimia() {
            const btn = document.getElementById('btn-reveal');
            const loader = document.getElementById('v-loader');
            const result = document.getElementById('v-result');
            const error = document.getElementById('error-msg');

            btn.style.display = 'none';
            loader.style.display = 'block';
            error.style.display = 'none';

            const prompt = `Actúa como un sabio alquimista del Ministerio del Amor. Hoy es ${dias[d.getDay()]}, regido por ${astros[d.getDay()]}. 
            Define el color de vela ideal y un ritual de 3 pasos para la paz y abundancia hoy.
            Responde estrictamente en este formato JSON:
            {"color": "Nombre del Color", "hex": "#codigoColor", "proposito": "Frase corta inspiradora", "ritual": ["paso 1", "paso 2", "paso 3"]}`;

            try {
                const response = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash:generateContent?key=${apiKey}`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ contents: [{ parts: [{ text: prompt }] }] })
                });

                if (!response.ok) throw new Error();

                const data = await response.json();
                const rawText = data.candidates[0].content.parts[0].text;
                const cleanJson = rawText.replace(/```json|```/g, "").trim();
                const res = JSON.parse(cleanJson);

                // Actualizar UI con resultados
                document.getElementById('r-color').innerText = "Vela " + res.color;
                document.getElementById('r-frase').innerText = res.proposito;
                document.getElementById('r-pasos').innerHTML = res.ritual.map(p => `<p>✦ ${p}</p>`).join('');
                
                // Cambiar color de la vela visualmente
                const candleObj = document.getElementById('candle-obj');
                const flameFx = document.getElementById('flame-fx');
                candleObj.style.background = `linear-gradient(to right, #444, ${res.hex}, #444)`;
                flameFx.style.boxShadow = `0 0 20px ${res.hex}aa`;

                loader.style.display = 'none';
                result.style.display = 'block';

            } catch (err) {
                loader.style.display = 'none';
                btn.style.display = 'block';
                error.style.display = 'block';
                setTimeout(() => { error.style.display = 'none'; }, 5000);
            }
        }
    </script>
</body>
</html>
