<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LUX ETERNA | Ministerio del Amor</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Cinzel:wght@400;700&family=Cormorant+Garamond:wght@300;500;700&family=Orbitron:wght@400;700&display=swap');
        
        :root { 
            --candle-color: #f3f4f6; 
            --glow-color: rgba(255, 191, 0, 0.4); 
        }
        
        body { 
            background-color: #0a090d; 
            color: #e2d9c2; 
            font-family: 'Cormorant Garamond', serif;
            background-image: radial-gradient(circle at center, #16141d 0%, #0a090d 100%);
            margin: 0; 
            min-height: 100vh;
            overflow-x: hidden;
        }

        /* Estilo Neón Solicitado */
        .neon-container {
            margin-top: 2rem;
            margin-bottom: 1.5rem;
            font-family: 'Orbitron', sans-serif;
            font-size: 0.65rem;
            letter-spacing: 0.25em;
            text-transform: uppercase;
        }

        .neon-blue {
            color: #fff;
            text-shadow: 
                0 0 7px #00f2ff,
                0 0 10px #00f2ff,
                0 0 21px #00f2ff;
            animation: pulse-blue 2s infinite alternate;
        }

        .neon-pink {
            color: #fff;
            text-shadow: 
                0 0 7px #ff00ea,
                0 0 10px #ff00ea,
                0 0 21px #ff00ea;
            animation: pulse-pink 2s infinite alternate;
            margin-left: 8px;
        }

        @keyframes pulse-blue {
            from { opacity: 0.8; text-shadow: 0 0 7px #00f2ff, 0 0 10px #00f2ff; }
            to { opacity: 1; text-shadow: 0 0 10px #00f2ff, 0 0 20px #00f2ff, 0 0 30px #00f2ff; }
        }

        @keyframes pulse-pink {
            from { opacity: 0.8; text-shadow: 0 0 7px #ff00ea, 0 0 10px #ff00ea; }
            to { opacity: 1; text-shadow: 0 0 10px #ff00ea, 0 0 20px #ff00ea, 0 0 30px #ff00ea; }
        }

        .cinzel { font-family: 'Cinzel', serif; }
        
        .flame-wrapper { position: relative; width: 20px; height: 40px; margin-bottom: 8px; }
        .flame {
            position: absolute; bottom: 0; left: 50%; transform: translateX(-50%);
            width: 16px; height: 28px; 
            background: linear-gradient(to bottom, #fff 0%, #ffeb3b 20%, #ff9800 50%, #f44336 100%);
            border-radius: 50% 50% 20% 20% / 60% 60% 40% 40%; 
            filter: blur(0.5px);
            box-shadow: 0 0 15px var(--glow-color), 0 0 30px var(--glow-color);
            animation: flicker 0.15s infinite alternate ease-in-out;
        }
        
        @keyframes flicker { 
            0% { transform: translateX(-50%) scale(1) rotate(-1deg); opacity: 0.9; } 
            100% { transform: translateX(-50%) scale(1.05) rotate(1deg); opacity: 1; } 
        }
        
        .glass { 
            background: rgba(255, 255, 255, 0.02); 
            backdrop-filter: blur(12px); 
            border: 1px solid rgba(197, 160, 89, 0.15); 
        }

        .candle-body { 
            width: 40px; 
            height: 100px; 
            background: linear-gradient(to right, #9ca3af, var(--candle-color) 50%, #9ca3af 100%); 
            border-radius: 4px; 
            transition: all 1.5s ease; 
        }

        .btn-mystic { 
            background: linear-gradient(135deg, #8a6d3b 0%, #c5a059 100%); 
            color: #0a090d; 
            box-shadow: 0 4px 20px rgba(138, 109, 59, 0.2); 
        }
        
        .message-box {
            position: fixed; top: 20px; left: 50%; transform: translateX(-50%);
            padding: 1rem 2rem; border-radius: 8px; background: #2d1a1a; color: #ff8080;
            border: 1px solid #ff4444; z-index: 100; display: none;
        }
    </style>
</head>
<body class="min-h-screen flex flex-col items-center p-6 text-center">

    <div id="error-msg" class="message-box cinzel text-xs tracking-widest uppercase"></div>

    <div class="neon-container">
        <span class="neon-blue">Ministerio del Amor</span>
        <span class="neon-pink">Presenta</span>
    </div>

    <header class="mb-8">
        <h1 class="cinzel text-3xl tracking-[0.25em] text-[#c5a059] mb-1">LUX ETERNA</h1>
        <p class="text-[8px] uppercase tracking-[0.6em] text-[#c5a059] opacity-50 font-bold">Guía de Velación Alquímica</p>
    </header>

    <div class="flex flex-col items-center mb-8">
        <div class="flame-wrapper"><div class="flame" id="v-flame"></div></div>
        <div class="candle-body" id="v-wax"></div>
    </div>

    <div class="mb-8 space-y-1">
        <p id="v-date" class="cinzel text-xl text-white font-light"></p>
        <p id="v-astral" class="text-[10px] italic text-[#c5a059] opacity-70 uppercase tracking-[0.2em]"></p>
    </div>

    <main class="w-full max-w-sm">
        <button id="btn-reveal" onclick="consultarIA()" class="w-full btn-mystic cinzel py-4 rounded-xl font-bold tracking-[0.2em] text-[11px] uppercase transition-all active:scale-95">
            Consultar Velación
        </button>

        <div id="v-loader" class="hidden flex flex-col items-center py-8">
            <div class="w-6 h-6 border-2 border-[#c5a059] border-t-transparent rounded-full animate-spin mb-4"></div>
            <p class="cinzel text-[9px] tracking-[0.3em] animate-pulse text-[#c5a059]">Sintonizando frecuencia astral...</p>
        </div>

        <div id="v-result" class="hidden space-y-4 text-left animate-in fade-in duration-1000">
            <div class="glass p-6 rounded-2xl border-t-2 border-t-[#c5a059]/30">
                <h3 class="cinzel text-[9px] text-[#c5a059] mb-2 tracking-[0.2em] uppercase text-center opacity-60">Vela Sugerida</h3>
                <p id="r-color" class="text-xl font-bold text-white mb-1 text-center tracking-wide"></p>
                <p id="r-purpose" class="text-sm italic text-gray-400 text-center leading-relaxed"></p>
            </div>
            
            <div class="glass p-6 rounded-2xl">
                <h3 class="cinzel text-[9px] text-[#c5a059] mb-4 tracking-[0.2em] uppercase opacity-60">Ritual de Activación</h3>
                <div id="r-steps" class="text-sm leading-relaxed text-gray-300 space-y-4"></div>
            </div>
            
            <button onclick="window.location.reload()" class="w-full text-[9px] cinzel text-gray-500 uppercase tracking-[0.3em] py-6 hover:text-[#c5a059] transition-colors">Nueva Consulta</button>
        </div>
    </main>

    <script>
        // Configuración de API
        const apiKey = ""; // La API key se inyecta automáticamente en el entorno
        const modelUrl = "https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash-preview-09-2025:generateContent";

        const d = new Date();
        const dias = ['Domingo', 'Lunes', 'Martes', 'Miércoles', 'Jueves', 'Viernes', 'Sábado'];
        const regs = ['el Sol', 'la Luna', 'Marte', 'Mercurio', 'Júpiter', 'Venus', 'Saturno'];
        
        document.getElementById('v-date').innerText = d.toLocaleDateString('es-ES', { day: 'numeric', month: 'long', year: 'numeric' });
        document.getElementById('v-astral').innerText = `Día de ${dias[d.getDay()]} · Regido por ${regs[d.getDay()]}`;

        function showMessage(msg) {
            const box = document.getElementById('error-msg');
            box.innerText = msg;
            box.style.display = 'block';
            setTimeout(() => { box.style.display = 'none'; }, 5000);
        }

        async function fetchWithRetry(prompt, retries = 5, delay = 1000) {
            for (let i = 0; i < retries; i++) {
                try {
                    const response = await fetch(`${modelUrl}?key=${apiKey}`, {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({
                            contents: [{ parts: [{ text: prompt }] }],
                            generationConfig: { 
                                responseMimeType: "application/json",
                                responseSchema: {
                                    type: "OBJECT",
                                    properties: {
                                        color: { type: "string" },
                                        hex: { type: "string" },
                                        frase: { type: "string" },
                                        pasos: { type: "ARRAY", items: { type: "string" } }
                                    }
                                }
                            }
                        })
                    });

                    if (!response.ok) throw new Error('Network response was not ok');
                    const data = await response.json();
                    return JSON.parse(data.candidates[0].content.parts[0].text);
                } catch (err) {
                    if (i === retries - 1) throw err;
                    await new Promise(res => setTimeout(res, delay));
                    delay *= 2; // Exponential backoff
                }
            }
        }

        async function consultarIA() {
            const btn = document.getElementById('btn-reveal');
            const loader = document.getElementById('v-loader');
            const result = document.getElementById('v-result');

            btn.classList.add('hidden');
            loader.classList.remove('hidden');

            const prompt = `Actúa como un experto en alquimia y velas. Hoy es ${dias[d.getDay()]}. Recomienda un color de vela específico para hoy y un ritual breve de 3 pasos. Devuelve JSON con campos: color, hex, frase (el propósito espiritual), pasos (array de strings).`;

            try {
                const res = await fetchWithRetry(prompt);

                document.getElementById('r-color').innerText = res.color;
                document.getElementById('r-purpose').innerText = res.frase;
                document.getElementById('r-steps').innerHTML = res.pasos.map(p => `
                    <div class="flex gap-3">
                        <span class="text-[#c5a059] opacity-50">✦</span>
                        <p>${p}</p>
                    </div>
                `).join('');
                
                // Animación de la vela
                document.documentElement.style.setProperty('--candle-color', res.hex);
                document.documentElement.style.setProperty('--glow-color', res.hex + '66');
                
                loader.classList.add('hidden');
                result.classList.remove('hidden');
            } catch (err) {
                console.error(err);
                loader.classList.add('hidden');
                btn.classList.remove('hidden');
                showMessage("La conexión astral es débil. Reintenta en unos segundos.");
            }
        }
    </script>
</body>
</html>
